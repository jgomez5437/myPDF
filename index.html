<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MyPDF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
<style>
  :root{
    --ink:#16161a;
    --paper:#ffffff;
    --workspace:#e3e6ea;
    --panel:#1d1e24;
    --panel-alt:#2a2b33;
    --panel-line:#34353f;
    --accent:#4c5fd5;
    --accent-strong:#3a4bb8;
    --warm:#f0a63d;
    --warm-strong:#d88e28;
    --danger:#e15258;
    --danger-strong:#c53f45;
    --success:#35b375;
    --border:#d3d6dc;
    --text-muted:#6b6e76;
    --radius:10px;
  }
  *{box-sizing:border-box;}
  html,body{height:100%;}
  body{
    margin:0;
    font-family:'Inter',-apple-system,BlinkMacSystemFont,sans-serif;
    color:var(--ink);
    background:var(--workspace);
    overflow:hidden;
  }
  .app{
    display:flex;
    flex-direction:column;
    height:100vh;
  }

  /* ---------- Top bar ---------- */
  .topbar{
    display:flex;
    align-items:center;
    gap:20px;
    padding:12px 20px;
    background:var(--paper);
    border-bottom:1px solid var(--border);
    flex-wrap:wrap;
  }
  .brand{
    display:flex;
    align-items:center;
    gap:8px;
    margin-right:4px;
  }
  .brand svg{display:block;}
  .brand-name{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:19px;
    letter-spacing:-0.02em;
  }
  .file-controls{
    display:flex;
    align-items:center;
    gap:10px;
    min-width:0;
  }
  .file-name{
    font-size:13px;
    color:var(--text-muted);
    white-space:nowrap;
    overflow:hidden;
    text-overflow:ellipsis;
    max-width:220px;
  }
  .save-status{
    display:flex;
    align-items:center;
    gap:8px;
    margin-left:auto;
    font-size:13px;
    color:var(--text-muted);
  }
  .dot{
    width:8px;height:8px;border-radius:50%;
    background:#c4c7cf;
    flex-shrink:0;
  }
  .dot.saved{background:var(--success);}
  .dot.saving{background:var(--warm);animation:pulse 1s ease-in-out infinite;}
  .dot.error{background:var(--danger);}
  @keyframes pulse{0%,100%{opacity:1;}50%{opacity:.35;}}

  /* ---------- Buttons ---------- */
  .btn{
    font-family:'Inter',sans-serif;
    font-size:13.5px;
    font-weight:600;
    border:none;
    border-radius:8px;
    padding:9px 16px;
    cursor:pointer;
    transition:background .15s ease, opacity .15s ease, transform .05s ease;
    white-space:nowrap;
  }
  .btn:active{transform:translateY(1px);}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none;}
  .btn-primary{background:var(--accent);color:#fff;}
  .btn-primary:not(:disabled):hover{background:var(--accent-strong);}
  .btn-ghost{background:var(--workspace);color:var(--ink);}
  .btn-ghost:not(:disabled):hover{background:#d6d9de;}

  /* ---------- Toolbar ---------- */
  .toolbar{
    display:flex;
    align-items:center;
    gap:22px;
    padding:10px 20px;
    background:var(--panel);
    flex-wrap:wrap;
  }
  .tool-group{
    display:flex;
    align-items:center;
    gap:8px;
    padding-right:22px;
    border-right:1px solid var(--panel-line);
  }
  .tool-group:last-child{border-right:none;padding-right:0;}
  .tool-btn{
    font-family:'Inter',sans-serif;
    font-size:13px;
    font-weight:600;
    color:#c9cad2;
    background:transparent;
    border:1px solid transparent;
    border-radius:8px;
    padding:8px 14px;
    cursor:pointer;
    transition:background .15s ease,color .15s ease;
  }
  .tool-btn:hover{background:var(--panel-alt);color:#fff;}
  .tool-btn.active{background:var(--warm);color:var(--ink);}
  .tool-btn:disabled{opacity:.35;cursor:not-allowed;}
  .control-label{
    display:flex;
    align-items:center;
    gap:7px;
    font-size:12.5px;
    color:#c9cad2;
    font-weight:500;
  }
  .control-label.hidden{display:none;}
  input[type="color"]{
    -webkit-appearance:none;
    width:28px;height:28px;
    border:2px solid var(--panel-line);
    border-radius:7px;
    padding:0;
    background:none;
    cursor:pointer;
  }
  input[type="color"]::-webkit-color-swatch-wrapper{padding:2px;}
  input[type="color"]::-webkit-color-swatch{border:none;border-radius:4px;}
  input[type="range"]{
    width:90px;
    accent-color:var(--warm);
  }
  #sizeValue{width:22px;color:#fff;font-variant-numeric:tabular-nums;}
  .btn-icon{
    background:var(--panel-alt);
    color:#fff;
    border:none;
    border-radius:8px;
    padding:8px 13px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
  }
  .btn-icon:hover:not(:disabled){background:#34353f;}
  .btn-icon:disabled{opacity:.3;cursor:not-allowed;}
  .btn-icon.danger:hover:not(:disabled){background:var(--danger-strong);}
  .zoom-percent{
    color:#c9cad2;
    font-size:12.5px;
    font-variant-numeric:tabular-nums;
    min-width:36px;
    text-align:center;
  }
  .page-nav{
    display:flex;
    align-items:center;
    gap:10px;
    color:#c9cad2;
    font-size:13px;
    margin-left:auto;
  }
  .page-nav .btn-ghost{
    background:var(--panel-alt);
    color:#fff;
    padding:7px 12px;
  }
  .page-nav .btn-ghost:hover:not(:disabled){background:#34353f;}

  /* ---------- Workspace ---------- */
  .workspace{
    flex:1;
    overflow:auto;
    position:relative;
    padding:32px 24px;
  }
  .empty-state{
    position:absolute;
    top:50%;left:50%;
    transform:translate(-50%,-50%);
    text-align:center;
    color:var(--text-muted);
  }
  .empty-state p{margin:0 0 16px;font-size:15px;}
  .stage{
    position:relative;
    margin:0 auto;
  }
  .page-stack{
    position:relative;
    transform-origin:top left;
    box-shadow:0 8px 30px rgba(20,20,30,.18);
  }
  #pdfCanvas, #drawCanvas{
    position:absolute;
    top:0;left:0;
    display:block;
  }
  #pdfCanvas{background:#fff;}
  .text-layer{
    position:absolute;
    top:0;left:0;
    pointer-events:none;
  }
  .interaction-layer{
    position:absolute;
    top:0;left:0;
    pointer-events:none;
  }

  /* ---------- Text boxes ---------- */
  .text-box{
    position:absolute;
    min-width:40px;
    pointer-events:auto;
    padding:2px 4px;
    border:1.5px solid transparent;
    border-radius:4px;
    cursor:grab;
    font-family:'Inter',sans-serif;
    line-height:1.25;
  }
  .text-box.selected{
    border-color:var(--accent);
    background:rgba(76,95,213,0.06);
  }
  .tb-content{
    outline:none;
    white-space:pre-wrap;
    word-break:break-word;
    min-width:36px;
    min-height:1.3em;
    cursor:text;
  }
  .text-box.selected .tb-content[contenteditable="true"]{
    cursor:text;
  }
  .tb-delete{
    position:absolute;
    top:-11px;right:-11px;
    width:20px;height:20px;
    border-radius:50%;
    border:none;
    background:var(--danger);
    color:#fff;
    font-size:14px;
    line-height:1;
    cursor:pointer;
    display:none;
    align-items:center;
    justify-content:center;
  }
  .text-box.selected .tb-delete{display:flex;}

  /* ---------- Toast ---------- */
  .toast{
    position:fixed;
    bottom:24px;left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--ink);
    color:#fff;
    padding:11px 20px;
    border-radius:8px;
    font-size:13.5px;
    opacity:0;
    pointer-events:none;
    transition:opacity .2s ease, transform .2s ease;
    z-index:50;
    max-width:80vw;
    text-align:center;
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }

  /* ---------------- Drag and drop overlay ---------------- */
  .drop-overlay{
    position:fixed;
    inset:0;
    background:rgba(15,15,20,0.6);
    z-index:100;
    display:none;
    align-items:center;
    justify-content:center;
    pointer-events:none;
  }
  .drop-overlay.active{display:flex;}
  .drop-overlay-box{
    border:3px dashed var(--warm);
    border-radius:16px;
    padding:44px 60px;
    background:rgba(29,30,36,0.92);
    color:#fff;
    text-align:center;
  }
  .drop-overlay-box .drop-title{
    font-family:'Space Grotesk',sans-serif;
    font-weight:700;
    font-size:21px;
    margin:0 0 6px;
  }
  .drop-overlay-box .drop-sub{
    font-size:13.5px;
    color:#c9cad2;
    margin:0;
  }

  /* ---------------- Eraser indicator ---------------- */
  .eraser-indicator{
    position:absolute;
    top:0;left:0;
    border:2px solid var(--danger);
    background:rgba(225,82,88,0.14);
    border-radius:50%;
    pointer-events:none;
    transform:translate(-50%,-50%);
    display:none;
    z-index:6;
  }
  .eraser-indicator.active{display:block;}

  @media (max-width:720px){
    .file-name{max-width:110px;}
    .toolbar{gap:12px;}
    .tool-group{padding-right:12px;}
    .page-nav{width:100%;justify-content:center;margin-left:0;order:5;}
  }
</style>
</head>
<body>
<div class="app">

  <header class="topbar">
    <div class="brand">
      <svg width="26" height="26" viewBox="0 0 26 26" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M5 2H16L21 7V24H5V2Z" fill="#ffffff" stroke="#16161a" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M16 2V7H21" fill="none" stroke="#16161a" stroke-width="1.4" stroke-linejoin="round"/>
        <path d="M7.5 20.5L17.5 10.5L20 13L10 23L7 23.5L7.5 20.5Z" fill="#f0a63d" stroke="#16161a" stroke-width="1.2" stroke-linejoin="round"/>
      </svg>
      <span class="brand-name">MyPDF</span>
    </div>
    <div class="file-controls">
      <button id="openBtn" class="btn btn-ghost">Open PDF</button>
      <input type="file" id="fileInput" accept="application/pdf" hidden>
      <span class="file-name" id="fileNameEl">No file loaded</span>
    </div>
    <div class="save-status">
      <span class="dot" id="saveDot"></span>
      <span id="saveText">No document</span>
    </div>
    <button id="downloadBtn" class="btn btn-primary" disabled>Save and download</button>
  </header>

  <div class="toolbar">
    <div class="tool-group">
      <button class="tool-btn active" data-tool="select" disabled>Select</button>
      <button class="tool-btn" data-tool="pen" disabled>Pen</button>
      <button class="tool-btn" data-tool="highlighter" disabled>Highlighter</button>
      <button class="tool-btn" data-tool="eraser" disabled>Eraser</button>
      <button class="tool-btn" data-tool="text" disabled>Text</button>
    </div>
    <div class="tool-group">
      <label class="control-label hidden" id="colorControl">
        Color
        <input type="color" id="colorPicker" value="#1c1c1e">
      </label>
      <label class="control-label hidden" id="sizeControl">
        <span id="sizeLabel">Size</span>
        <input type="range" id="sizeSlider" min="1" max="30" value="3">
        <span id="sizeValue">3</span>
      </label>
    </div>
    <div class="tool-group">
      <button id="undoBtn" class="btn-icon" title="Undo (Ctrl+Z)" disabled>Undo</button>
      <button id="redoBtn" class="btn-icon" title="Redo (Ctrl+Y)" disabled>Redo</button>
      <button id="deleteBtn" class="btn-icon danger" title="Delete selected text box" disabled>Delete text</button>
    </div>
    <div class="tool-group zoom-group">
      <button id="zoomOutBtn" class="btn-icon" title="Zoom out (Ctrl+-)" disabled>&minus;</button>
      <span id="zoomPercent" class="zoom-percent">100%</span>
      <button id="zoomInBtn" class="btn-icon" title="Zoom in (Ctrl++)" disabled>+</button>
      <button id="zoomFitBtn" class="btn-icon" title="Fit to width (Ctrl+0)" disabled>Fit</button>
    </div>
    <div class="page-nav">
      <button id="prevPageBtn" class="btn btn-ghost" disabled>Prev</button>
      <span id="pageIndicator">No pages</span>
      <button id="nextPageBtn" class="btn btn-ghost" disabled>Next</button>
    </div>
  </div>

  <main class="workspace" id="workspace">
    <div class="empty-state" id="emptyState">
      <p>Open a PDF to start marking it up, or drop one anywhere on the screen.</p>
      <button id="emptyOpenBtn" class="btn btn-primary">Open PDF</button>
    </div>
    <div class="stage" id="stage" style="display:none;">
      <div class="page-stack" id="pageStack">
        <canvas id="pdfCanvas"></canvas>
        <canvas id="drawCanvas"></canvas>
        <div class="text-layer" id="textLayer"></div>
        <div class="interaction-layer" id="interactionLayer"></div>
        <div class="eraser-indicator" id="eraserIndicator"></div>
      </div>
    </div>
  </main>

  <div class="toast" id="toast"></div>
  <div class="drop-overlay" id="dropOverlay">
    <div class="drop-overlay-box">
      <p class="drop-title">Drop your PDF to open it</p>
      <p class="drop-sub">Release anywhere on the screen</p>
    </div>
  </div>
</div>

<script>
pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';

/* ---------------- storage ---------------- */
// Progress is saved to the browser's localStorage, keyed by file name and size,
// so reopening the same PDF on this device restores your annotations.
const STORAGE_PREFIX = 'mypdf_';
let hasStorage = true;
try{
  const testKey = '__mypdf_test__';
  localStorage.setItem(testKey, '1');
  localStorage.removeItem(testKey);
}catch(e){
  hasStorage = false;
}

/* ---------------- element refs ---------------- */
const fileInput = document.getElementById('fileInput');
const openBtn = document.getElementById('openBtn');
const emptyOpenBtn = document.getElementById('emptyOpenBtn');
const fileNameEl = document.getElementById('fileNameEl');
const saveDot = document.getElementById('saveDot');
const saveText = document.getElementById('saveText');
const downloadBtn = document.getElementById('downloadBtn');
const emptyState = document.getElementById('emptyState');
const stage = document.getElementById('stage');
const pageStack = document.getElementById('pageStack');
const pdfCanvas = document.getElementById('pdfCanvas');
const drawCanvas = document.getElementById('drawCanvas');
const textLayer = document.getElementById('textLayer');
const interactionLayer = document.getElementById('interactionLayer');
const eraserIndicator = document.getElementById('eraserIndicator');
const workspace = document.getElementById('workspace');
const toast = document.getElementById('toast');
const colorControl = document.getElementById('colorControl');
const sizeControl = document.getElementById('sizeControl');
const sizeLabel = document.getElementById('sizeLabel');
const colorPicker = document.getElementById('colorPicker');
const sizeSlider = document.getElementById('sizeSlider');
const sizeValue = document.getElementById('sizeValue');
const undoBtn = document.getElementById('undoBtn');
const redoBtn = document.getElementById('redoBtn');
const deleteBtn = document.getElementById('deleteBtn');
const prevPageBtn = document.getElementById('prevPageBtn');
const nextPageBtn = document.getElementById('nextPageBtn');
const pageIndicator = document.getElementById('pageIndicator');
const zoomInBtn = document.getElementById('zoomInBtn');
const zoomOutBtn = document.getElementById('zoomOutBtn');
const zoomFitBtn = document.getElementById('zoomFitBtn');
const zoomPercent = document.getElementById('zoomPercent');
const toolButtons = document.querySelectorAll('.tool-btn');

/* ---------------- app state ---------------- */
const state = {
  numPages: 0,
  currentPage: 1,
  scale: 2.5,
  pages: {}
};
let pdfDoc = null;
let pdfBytes = null;
let docId = null;
let currentTool = 'select';
let penColor = '#1c1c1e';
let highlighterColor = '#ffe066';
let textDefaultColor = '#1c1c1e';
let currentWidth = 3;
let highlighterWidth = 18;
let eraserSize = 24;
let currentFontSize = 18;
let selectedTextBoxId = null;
let currentStroke = null;
let isDrawing = false;
let isErasing = false;
let editSessionActive = false;
let colorSessionStarted = false;
let sizeSessionStarted = false;
let dragState = null;
let historyStack = [];
let redoStack = [];
let autosaveTimer = null;
let toastTimer = null;
let displayScale = 1;
const ZOOM_MIN = 0.3, ZOOM_MAX = 5, ZOOM_STEP = 1.25;
const activeTouchPointers = new Map();
let pinchActive = false;
let pinchStartDist = 0;
let pinchStartZoom = 1;

function uid(){ return 'id' + Math.random().toString(36).slice(2) + Date.now().toString(36); }
function sanitizeKey(s){ return s.replace(/[\s\/\\'"]+/g, '_').slice(0,150); }
function getCurrentPageData(){
  if(!state.pages[state.currentPage]) state.pages[state.currentPage] = { strokes:[], textBoxes:[] };
  return state.pages[state.currentPage];
}
function findTextBox(id){
  const pd = getCurrentPageData();
  return pd.textBoxes.find(t=>t.id===id) || null;
}
function showToast(msg){
  toast.textContent = msg;
  toast.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(()=> toast.classList.remove('show'), 3200);
}
function setSaveStatus(kind, text){
  saveDot.className = 'dot ' + kind;
  saveText.textContent = text;
}

/* ---------------- history ---------------- */
function pushHistory(){
  if(!pdfDoc) return;
  historyStack.push(JSON.stringify(state.pages));
  if(historyStack.length > 60) historyStack.shift();
  redoStack = [];
  updateUndoRedoButtons();
}
function undo(){
  if(historyStack.length===0) return;
  redoStack.push(JSON.stringify(state.pages));
  state.pages = JSON.parse(historyStack.pop());
  selectedTextBoxId = null;
  deleteBtn.disabled = true;
  redrawOverlay();
  renderTextBoxes();
  scheduleAutosave();
  updateUndoRedoButtons();
}
function redo(){
  if(redoStack.length===0) return;
  historyStack.push(JSON.stringify(state.pages));
  state.pages = JSON.parse(redoStack.pop());
  selectedTextBoxId = null;
  deleteBtn.disabled = true;
  redrawOverlay();
  renderTextBoxes();
  scheduleAutosave();
  updateUndoRedoButtons();
}
function updateUndoRedoButtons(){
  undoBtn.disabled = historyStack.length===0;
  redoBtn.disabled = redoStack.length===0;
}

/* ---------------- autosave ---------------- */
function scheduleAutosave(){
  if(!docId) return;
  if(!hasStorage){ setSaveStatus('error', 'Autosave unavailable in this browser'); return; }
  setSaveStatus('saving', 'Saving...');
  clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(()=>{
    try{
      localStorage.setItem(STORAGE_PREFIX + docId, JSON.stringify({ pages: state.pages, savedAt: Date.now() }));
      setSaveStatus('saved', 'All changes saved');
    }catch(e){
      setSaveStatus('error', 'Autosave failed (storage may be full)');
    }
  }, 600);
}
function tryRestoreProgress(){
  if(!hasStorage) return;
  try{
    const raw = localStorage.getItem(STORAGE_PREFIX + docId);
    if(raw){
      const saved = JSON.parse(raw);
      if(saved && saved.pages){
        state.pages = saved.pages;
        showToast('Restored your previous progress on this file.');
      }
    }
  }catch(e){ /* nothing saved yet, or corrupted entry */ }
}

/* ---------------- tool switching ---------------- */
function setTool(tool){
  currentTool = tool;
  if(tool!=='eraser') hideEraserIndicator();
  toolButtons.forEach(b=> b.classList.toggle('active', b.dataset.tool===tool));
  const drawingTool = (tool==='pen' || tool==='highlighter' || tool==='eraser');
  interactionLayer.style.pointerEvents = (drawingTool || tool==='text') ? 'auto' : 'none';
  interactionLayer.style.cursor = (tool==='pen' || tool==='highlighter') ? 'crosshair' : tool==='eraser' ? 'cell' : tool==='text' ? 'text' : 'default';

  if(tool==='pen'){
    sizeLabel.textContent='Stroke width'; sizeSlider.min=1; sizeSlider.max=30;
    sizeSlider.value=currentWidth; sizeValue.textContent=currentWidth;
    sizeControl.classList.remove('hidden'); colorControl.classList.remove('hidden');
    colorPicker.value = penColor;
  } else if(tool==='highlighter'){
    sizeLabel.textContent='Highlighter width'; sizeSlider.min=6; sizeSlider.max=40;
    sizeSlider.value=highlighterWidth; sizeValue.textContent=highlighterWidth;
    sizeControl.classList.remove('hidden'); colorControl.classList.remove('hidden');
    colorPicker.value = highlighterColor;
  } else if(tool==='eraser'){
    sizeLabel.textContent='Eraser size'; sizeSlider.min=10; sizeSlider.max=80;
    sizeSlider.value=eraserSize; sizeValue.textContent=eraserSize;
    sizeControl.classList.remove('hidden'); colorControl.classList.add('hidden');
    updateEraserIndicatorSize();
  } else if(tool==='text'){
    sizeLabel.textContent='Font size'; sizeSlider.min=10; sizeSlider.max=56;
    sizeSlider.value=currentFontSize; sizeValue.textContent=currentFontSize;
    sizeControl.classList.remove('hidden'); colorControl.classList.remove('hidden');
    colorPicker.value = textDefaultColor;
  } else {
    const tb = selectedTextBoxId ? findTextBox(selectedTextBoxId) : null;
    if(tb){
      sizeLabel.textContent='Font size'; sizeSlider.min=10; sizeSlider.max=56;
      sizeSlider.value=tb.fontSize; sizeValue.textContent=tb.fontSize;
      sizeControl.classList.remove('hidden'); colorControl.classList.remove('hidden');
      colorPicker.value = tb.color;
    } else {
      sizeControl.classList.add('hidden'); colorControl.classList.add('hidden');
    }
  }
}
toolButtons.forEach(btn=>{
  btn.addEventListener('click', ()=>{
    if(btn.disabled) return;
    setTool(btn.dataset.tool);
  });
});

colorPicker.addEventListener('input', ()=>{
  const v = colorPicker.value;
  if(currentTool==='pen') penColor = v;
  else if(currentTool==='highlighter') highlighterColor = v;
  else if(currentTool==='text') textDefaultColor = v;
  if(currentTool==='select' && selectedTextBoxId){
    if(!colorSessionStarted){ pushHistory(); colorSessionStarted = true; }
    const tb = findTextBox(selectedTextBoxId);
    if(tb){ tb.color = v; renderTextBoxes(); }
  }
});
colorPicker.addEventListener('change', ()=>{
  if(colorSessionStarted){ scheduleAutosave(); updateUndoRedoButtons(); colorSessionStarted=false; }
});

sizeSlider.addEventListener('input', ()=>{
  const v = Number(sizeSlider.value);
  sizeValue.textContent = v;
  if(currentTool==='pen') currentWidth = v;
  else if(currentTool==='highlighter') highlighterWidth = v;
  else if(currentTool==='eraser'){ eraserSize = v; updateEraserIndicatorSize(); }
  else if(currentTool==='text') currentFontSize = v;
  else if(currentTool==='select' && selectedTextBoxId){
    if(!sizeSessionStarted){ pushHistory(); sizeSessionStarted = true; }
    const tb = findTextBox(selectedTextBoxId);
    if(tb){ tb.fontSize = v; renderTextBoxes(); }
  }
});
sizeSlider.addEventListener('change', ()=>{
  if(sizeSessionStarted){ scheduleAutosave(); updateUndoRedoButtons(); sizeSessionStarted=false; }
});

/* ---------------- file loading ---------------- */
function enableToolbar(enabled){
  toolButtons.forEach(b=> b.disabled = !enabled);
  downloadBtn.disabled = !enabled;
  zoomInBtn.disabled = !enabled;
  zoomOutBtn.disabled = !enabled;
  zoomFitBtn.disabled = !enabled;
}
openBtn.addEventListener('click', ()=> fileInput.click());
emptyOpenBtn.addEventListener('click', ()=> fileInput.click());
fileInput.addEventListener('change', (e)=>{
  const file = e.target.files[0];
  if(file) loadFile(file);
  fileInput.value = '';
});

/* ---------------- drag and drop ---------------- */
const dropOverlay = document.getElementById('dropOverlay');
let dragCounter = 0;

function isFileDrag(e){
  return !!(e.dataTransfer && Array.from(e.dataTransfer.types || []).includes('Files'));
}
window.addEventListener('dragenter', (e)=>{
  e.preventDefault();
  if(!isFileDrag(e)) return;
  dragCounter++;
  dropOverlay.classList.add('active');
});
window.addEventListener('dragover', (e)=>{
  e.preventDefault();
  if(isFileDrag(e)) e.dataTransfer.dropEffect = 'copy';
});
window.addEventListener('dragleave', (e)=>{
  if(!isFileDrag(e)) return;
  dragCounter = Math.max(0, dragCounter - 1);
  if(dragCounter === 0) dropOverlay.classList.remove('active');
});
window.addEventListener('drop', (e)=>{
  e.preventDefault();
  dragCounter = 0;
  dropOverlay.classList.remove('active');
  if(!isFileDrag(e)) return;
  const files = Array.from(e.dataTransfer.files || []);
  const pdfFile = files.find(f => f.type === 'application/pdf' || f.name.toLowerCase().endsWith('.pdf'));
  if(pdfFile) loadFile(pdfFile);
  else if(files.length) showToast('Please drop a PDF file.');
});

async function loadFile(file){
  try{
    setSaveStatus('saving', 'Loading document...');
    const buf = await file.arrayBuffer();
    pdfBytes = buf;
    const pdfjsBuf = buf.slice(0);
    const task = pdfjsLib.getDocument({ data: pdfjsBuf });
    pdfDoc = await task.promise;

    state.numPages = pdfDoc.numPages;
    state.currentPage = 1;
    state.pages = {};
    for(let i=1;i<=state.numPages;i++) state.pages[i] = { strokes:[], textBoxes:[] };

    docId = sanitizeKey(file.name + '_' + file.size);
    historyStack = []; redoStack = [];
    selectedTextBoxId = null;
    deleteBtn.disabled = true;
    activeTouchPointers.clear();
    pinchActive = false;

    fileNameEl.textContent = file.name;
    emptyState.style.display = 'none';
    stage.style.display = 'block';
    enableToolbar(true);

    await tryRestoreProgress();
    await renderPage(1);
    fitToWidth();
    setTool('select');
    updateUndoRedoButtons();
    setSaveStatus(hasStorage ? 'saved' : 'error', hasStorage ? 'All changes saved' : 'Autosave unavailable in this browser');
  }catch(err){
    console.error(err);
    showToast('Could not open that PDF. Please try a different file.');
    setSaveStatus('error', 'Could not load document');
  }
}

/* ---------------- rendering ---------------- */
async function renderPage(num){
  if(!pdfDoc) return;
  hideEraserIndicator();
  state.currentPage = num;
  const page = await pdfDoc.getPage(num);
  const viewport = page.getViewport({ scale: state.scale });

  pdfCanvas.width = viewport.width;
  pdfCanvas.height = viewport.height;
  drawCanvas.width = viewport.width;
  drawCanvas.height = viewport.height;
  pageStack.style.width = viewport.width + 'px';
  pageStack.style.height = viewport.height + 'px';
  textLayer.style.width = viewport.width + 'px';
  textLayer.style.height = viewport.height + 'px';
  interactionLayer.style.width = viewport.width + 'px';
  interactionLayer.style.height = viewport.height + 'px';

  const ctx = pdfCanvas.getContext('2d');
  await page.render({ canvasContext: ctx, viewport }).promise;

  if(!state.pages[num]) state.pages[num] = { strokes:[], textBoxes:[] };

  redrawOverlay();
  renderTextBoxes();
  applyDisplayScale();

  pageIndicator.textContent = `Page ${num} of ${state.numPages}`;
  prevPageBtn.disabled = num<=1;
  nextPageBtn.disabled = num>=state.numPages;
}

/* ---------------- zoom ---------------- */
function applyDisplayScale(){
  if(!pdfCanvas.width) return;
  displayScale = Math.min(ZOOM_MAX, Math.max(ZOOM_MIN, displayScale));
  pageStack.style.transform = `scale(${displayScale})`;
  stage.style.width = (pdfCanvas.width * displayScale) + 'px';
  stage.style.height = (pdfCanvas.height * displayScale) + 'px';
  zoomPercent.textContent = Math.round(displayScale * 100) + '%';
}
function fitToWidth(){
  if(!pdfCanvas.width) return;
  const available = workspace.clientWidth - 48;
  let scale = available / pdfCanvas.width;
  if(!isFinite(scale) || scale<=0) scale = 1;
  displayScale = Math.min(scale, 1.5);
  applyDisplayScale();
}
function setZoom(newScale){
  if(!pdfDoc) return;
  displayScale = newScale;
  applyDisplayScale();
}
function zoomIn(){ if(pdfDoc) setZoom(displayScale * ZOOM_STEP); }
function zoomOut(){ if(pdfDoc) setZoom(displayScale / ZOOM_STEP); }
zoomInBtn.addEventListener('click', zoomIn);
zoomOutBtn.addEventListener('click', zoomOut);
zoomFitBtn.addEventListener('click', fitToWidth);
workspace.addEventListener('wheel', (e)=>{
  if(!(e.ctrlKey || e.metaKey) || !pdfDoc) return;
  e.preventDefault();
  if(e.deltaY < 0) zoomIn(); else zoomOut();
}, { passive:false });
window.addEventListener('resize', ()=> applyDisplayScale());

/* ---------------- pinch to zoom (touch) ---------------- */
function touchPointsDistance(){
  const pts = Array.from(activeTouchPointers.values());
  if(pts.length < 2) return 0;
  return Math.hypot(pts[0].x - pts[1].x, pts[0].y - pts[1].y);
}
// Listening in the capture phase lets us intercept a second finger touching
// down before it reaches the drawing layer, so a pinch never starts an
// accidental second stroke or erase gesture.
workspace.addEventListener('pointerdown', (e)=>{
  if(e.pointerType !== 'touch' || !pdfDoc) return;
  activeTouchPointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if(activeTouchPointers.size === 2){
    if(isDrawing) onPenUp();
    if(isErasing) onEraserUp();
    pinchActive = true;
    pinchStartDist = touchPointsDistance();
    pinchStartZoom = displayScale;
    e.stopPropagation();
  } else if(activeTouchPointers.size > 2){
    e.stopPropagation();
  }
}, true);
workspace.addEventListener('pointermove', (e)=>{
  if(!activeTouchPointers.has(e.pointerId)) return;
  activeTouchPointers.set(e.pointerId, { x:e.clientX, y:e.clientY });
  if(pinchActive && activeTouchPointers.size === 2 && pinchStartDist > 0){
    const dist = touchPointsDistance();
    setZoom(pinchStartZoom * (dist / pinchStartDist));
    e.stopPropagation();
    e.preventDefault();
  }
}, true);
function endTouchPointer(e){
  if(!activeTouchPointers.has(e.pointerId)) return;
  activeTouchPointers.delete(e.pointerId);
  if(activeTouchPointers.size < 2){
    pinchActive = false;
    pinchStartDist = 0;
  }
}
workspace.addEventListener('pointerup', endTouchPointer, true);
workspace.addEventListener('pointercancel', endTouchPointer, true);

function getDocCoords(evt){
  const rect = pageStack.getBoundingClientRect();
  const scaleX = pageStack.offsetWidth / rect.width;
  const scaleY = pageStack.offsetHeight / rect.height;
  return {
    x: (evt.clientX - rect.left) * scaleX,
    y: (evt.clientY - rect.top) * scaleY
  };
}

prevPageBtn.addEventListener('click', ()=>{ if(state.currentPage>1) renderPage(state.currentPage-1); });
nextPageBtn.addEventListener('click', ()=>{ if(state.currentPage<state.numPages) renderPage(state.currentPage+1); });

/* ---------------- drawing overlay ---------------- */
function drawStrokePath(ctx, stroke){
  if(stroke.points.length===0) return;
  ctx.beginPath();
  ctx.moveTo(stroke.points[0].x, stroke.points[0].y);
  for(let i=1;i<stroke.points.length;i++) ctx.lineTo(stroke.points[i].x, stroke.points[i].y);
  ctx.strokeStyle = stroke.color;
  ctx.lineWidth = stroke.width;
  ctx.lineCap = stroke.cap || 'round';
  ctx.lineJoin = 'round';
  ctx.globalAlpha = (stroke.opacity !== undefined) ? stroke.opacity : 1;
  ctx.stroke();
  ctx.globalAlpha = 1;
}
function redrawOverlay(){
  const ctx = drawCanvas.getContext('2d');
  ctx.clearRect(0,0,drawCanvas.width, drawCanvas.height);
  const pd = getCurrentPageData();
  for(const stroke of pd.strokes) drawStrokePath(ctx, stroke);
  if(currentStroke) drawStrokePath(ctx, currentStroke);
}

/* ---------------- pen and highlighter tools ---------------- */
function getStrokeConfig(){
  if(currentTool==='highlighter'){
    return { color: highlighterColor, width: highlighterWidth, opacity: 0.38, cap: 'butt' };
  }
  return { color: penColor, width: currentWidth, opacity: 1, cap: 'round' };
}
function onPenDown(e){
  pushHistory();
  isDrawing = true;
  const {x,y} = getDocCoords(e);
  const cfg = getStrokeConfig();
  currentStroke = { id: uid(), color: cfg.color, width: cfg.width, opacity: cfg.opacity, cap: cfg.cap, points:[{x,y}] };
  interactionLayer.setPointerCapture(e.pointerId);
}
function onPenMove(e){
  if(!isDrawing) return;
  const {x,y} = getDocCoords(e);
  currentStroke.points.push({x,y});
  redrawOverlay();
}
function onPenUp(){
  if(!isDrawing) return;
  isDrawing = false;
  if(currentStroke.points.length>=2) getCurrentPageData().strokes.push(currentStroke);
  currentStroke = null;
  redrawOverlay();
  scheduleAutosave();
  updateUndoRedoButtons();
}

/* ---------------- eraser indicator ---------------- */
function updateEraserIndicatorSize(){
  const d = eraserSize * 2;
  eraserIndicator.style.width = d + 'px';
  eraserIndicator.style.height = d + 'px';
}
function moveEraserIndicator(x, y){
  eraserIndicator.style.left = x + 'px';
  eraserIndicator.style.top = y + 'px';
}
function showEraserIndicator(){ eraserIndicator.classList.add('active'); }
function hideEraserIndicator(){ eraserIndicator.classList.remove('active'); }

/* ---------------- eraser tool ---------------- */
// Finds where a line segment crosses a circle of radius r centered at (cx,cy).
// Returns the crossing points (as {x,y}) that fall within the segment, in
// order from p1 towards p2.
function segmentCircleIntersections(p1, p2, cx, cy, r){
  const dx = p2.x - p1.x, dy = p2.y - p1.y;
  const a = dx*dx + dy*dy;
  if(a === 0) return [];
  const fx = p1.x - cx, fy = p1.y - cy;
  const b = 2 * (fx*dx + fy*dy);
  const c = fx*fx + fy*fy - r*r;
  let disc = b*b - 4*a*c;
  if(disc < 0) return [];
  disc = Math.sqrt(disc);
  const t1 = (-b - disc) / (2*a);
  const t2 = (-b + disc) / (2*a);
  const ts = [];
  if(t1 >= 0 && t1 <= 1) ts.push(t1);
  if(t2 >= 0 && t2 <= 1 && Math.abs(t2-t1) > 1e-9) ts.push(t2);
  ts.sort((a,b)=>a-b);
  return ts.map(t => ({ x: p1.x + dx*t, y: p1.y + dy*t }));
}
// Clips a stroke's points against a circular eraser, cutting precisely at the
// circle's edge (via line-circle intersection) rather than only dropping
// whole sampled points. That keeps the erased hole matching the eraser
// indicator exactly, instead of overshooting between sparse sample points.
function eraseStrokeAgainstCircle(points, cx, cy, r){
  const dist = (p)=> Math.hypot(p.x-cx, p.y-cy);
  const groups = [];
  let current = [];
  let touched = false;
  let prevInside = null;
  for(let i=0;i<points.length;i++){
    const p = points[i];
    const pInside = dist(p) <= r;
    if(pInside) touched = true;
    if(i===0){
      if(!pInside) current.push(p);
      prevInside = pInside;
      continue;
    }
    const prev = points[i-1];
    if(prevInside && pInside){
      // fully inside, nothing to draw
    } else if(!prevInside && !pInside){
      const ints = segmentCircleIntersections(prev, p, cx, cy, r);
      if(ints.length >= 2){
        touched = true;
        current.push(ints[0]);
        groups.push(current);
        current = [ints[1], p];
      } else {
        current.push(p);
      }
    } else if(!prevInside && pInside){
      const ints = segmentCircleIntersections(prev, p, cx, cy, r);
      if(ints.length >= 1) current.push(ints[0]);
      if(current.length >= 2) groups.push(current);
      current = [];
    } else {
      const ints = segmentCircleIntersections(prev, p, cx, cy, r);
      current = ints.length >= 1 ? [ints[ints.length-1], p] : [p];
    }
    prevInside = pInside;
  }
  if(current.length >= 2) groups.push(current);
  return { groups, touched };
}
function eraseAtRadius(pageData, x, y, r){
  let changed = false;
  const newStrokes = [];
  for(const stroke of pageData.strokes){
    const { groups, touched } = eraseStrokeAgainstCircle(stroke.points, x, y, r);
    if(!touched){
      newStrokes.push(stroke);
      continue;
    }
    changed = true;
    for(const g of groups){
      if(g.length>=2) newStrokes.push({ id:uid(), color:stroke.color, width:stroke.width, opacity:stroke.opacity, cap:stroke.cap, points:g });
    }
  }
  if(changed) pageData.strokes = newStrokes;
  return changed;
}
function onEraserDown(e){
  pushHistory();
  isErasing = true;
  interactionLayer.setPointerCapture(e.pointerId);
  const {x,y} = getDocCoords(e);
  moveEraserIndicator(x,y);
  showEraserIndicator();
  performErase(e);
}
function onEraserMove(e){
  const {x,y} = getDocCoords(e);
  moveEraserIndicator(x,y);
  showEraserIndicator();
  if(!isErasing) return;
  performErase(e);
}
function onEraserUp(e){
  if(!isErasing) return;
  isErasing = false;
  // Touch and pen have no hover state, so hide the indicator once the
  // finger/stylus lifts. A mouse keeps hovering, so leave it visible.
  if(e && e.pointerType !== 'mouse') hideEraserIndicator();
  scheduleAutosave();
  updateUndoRedoButtons();
}
function performErase(e){
  const {x,y} = getDocCoords(e);
  eraseAtRadius(getCurrentPageData(), x, y, eraserSize);
  redrawOverlay();
}

/* ---------------- text tool ---------------- */
function onTextClick(e){
  const {x,y} = getDocCoords(e);
  pushHistory();
  const tb = { id: uid(), x, y, width: 220, text:'', color: textDefaultColor, fontSize: currentFontSize };
  getCurrentPageData().textBoxes.push(tb);
  selectedTextBoxId = tb.id;
  deleteBtn.disabled = false;
  setTool('select');
  renderTextBoxes();
  scheduleAutosave();
  updateUndoRedoButtons();

    if(el){ editSessionActive = true; el.contentEditable = 'true'; el.focus(); }
  }, 0);
}

/* ---------------- interaction layer dispatch ---------------- */
interactionLayer.addEventListener('pointerdown', (e)=>{
  if(currentTool==='pen' || currentTool==='highlighter') onPenDown(e);
  else if(currentTool==='eraser') onEraserDown(e);
});
interactionLayer.addEventListener('pointermove', (e)=>{
  if(currentTool==='pen' || currentTool==='highlighter') onPenMove(e);
  else if(currentTool==='eraser') onEraserMove(e);
});
interactionLayer.addEventListener('pointerup', (e)=>{
  if(currentTool==='pen' || currentTool==='highlighter') onPenUp(e);
  else if(currentTool==='eraser') onEraserUp(e);
});
interactionLayer.addEventListener('pointercancel', (e)=>{
  if(currentTool==='pen' || currentTool==='highlighter') onPenUp(e);
  else if(currentTool==='eraser') onEraserUp(e);
});
interactionLayer.addEventListener('pointerleave', (e)=>{
  if(currentTool==='eraser' && !isErasing) hideEraserIndicator();
});
interactionLayer.addEventListener('click', (e)=>{

});

/* deselect when clicking empty canvas area in select mode */
pageStack.addEventListener('pointerdown', (e)=>{
  if(currentTool==='select' && (e.target===pdfCanvas || e.target===drawCanvas || e.target===textLayer)){
    if(selectedTextBoxId){
      selectedTextBoxId = null;
      deleteBtn.disabled = true;
      renderTextBoxes();
      setTool('select');
    }
  }
});

/* ---------------- text boxes ---------------- */
function selectTextBox(id){
  selectedTextBoxId = id;
  deleteBtn.disabled = false;
  renderTextBoxes();
  if(currentTool==='select') setTool('select');
}
function deleteTextBox(id){
  pushHistory();
  const pd = getCurrentPageData();
  pd.textBoxes = pd.textBoxes.filter(t=>t.id!==id);
  if(selectedTextBoxId===id){ selectedTextBoxId=null; deleteBtn.disabled=true; }
  renderTextBoxes();
  scheduleAutosave();
  updateUndoRedoButtons();
}
deleteBtn.addEventListener('click', ()=>{ if(selectedTextBoxId) deleteTextBox(selectedTextBoxId); });

function startDragTextBox(tb, evt){
  evt.preventDefault();
  const startDoc = getDocCoords(evt);
  dragState = { tb, offsetX: startDoc.x - tb.x, offsetY: startDoc.y - tb.y, moved:false, historyPushed:false };
  window.addEventListener('pointermove', onDragMove);
  window.addEventListener('pointerup', onDragEnd);
}
function onDragMove(evt){
  if(!dragState) return;
  const {x,y} = getDocCoords(evt);
  if(!dragState.historyPushed){ pushHistory(); dragState.historyPushed = true; }
  dragState.tb.x = x - dragState.offsetX;
  dragState.tb.y = y - dragState.offsetY;
  dragState.moved = true;
  renderTextBoxes();
}
function onDragEnd(){
  window.removeEventListener('pointermove', onDragMove);
  window.removeEventListener('pointerup', onDragEnd);
  if(dragState && dragState.moved){ scheduleAutosave(); updateUndoRedoButtons(); }
  dragState = null;
}

function placeCaretAtEnd(el){
  el.focus();
  if(window.getSelection && document.createRange){
    const range = document.createRange();
    range.selectNodeContents(el);
    range.collapse(false);
    const sel = window.getSelection();
    sel.removeAllRanges();
    sel.addRange(range);
  }
}

function renderTextBoxes(){
  textLayer.innerHTML = '';
  const pd = getCurrentPageData();
  for(const tb of pd.textBoxes){
    const wrap = document.createElement('div');
    wrap.className = 'text-box' + (tb.id===selectedTextBoxId ? ' selected' : '');
    wrap.dataset.id = tb.id;
    wrap.style.left = tb.x + 'px';
    wrap.style.top = tb.y + 'px';
    wrap.style.width = tb.width + 'px';
    wrap.style.color = tb.color;
    wrap.style.fontSize = tb.fontSize + 'px';

    const content = document.createElement('div');
    content.className = 'tb-content';
    content.contentEditable = 'false';
    content.spellcheck = false;
    content.innerText = tb.text;

    content.addEventListener('focus', ()=>{
      if(!editSessionActive){ pushHistory(); editSessionActive = true; }
    });
    content.addEventListener('input', ()=>{ tb.text = content.innerText; });
    content.addEventListener('blur', ()=>{
      content.contentEditable = 'false';
      editSessionActive = false;
      scheduleAutosave();
      updateUndoRedoButtons();
    });

    const delBtn = document.createElement('button');
    delBtn.className = 'tb-delete';
    delBtn.type = 'button';
    delBtn.title = 'Delete text box';
    delBtn.innerHTML = '&times;';
    delBtn.addEventListener('pointerdown', e=> e.stopPropagation());
    delBtn.addEventListener('click', e=>{ e.stopPropagation(); deleteTextBox(tb.id); });

    wrap.addEventListener('dblclick', ()=>{
      content.contentEditable = 'true';
      placeCaretAtEnd(content);
    });
    wrap.addEventListener('pointerdown', (e)=>{
      if(currentTool!=='select') return;
      e.stopPropagation();
      selectTextBox(tb.id);
      if(content.isContentEditable) return;
      startDragTextBox(tb, e);
    });

    wrap.appendChild(content);
    wrap.appendChild(delBtn);
    textLayer.appendChild(wrap);
  }
}

/* ---------------- keyboard shortcuts ---------------- */
window.addEventListener('keydown', (e)=>{
  const activeEl = document.activeElement;
  const isEditingText = activeEl && activeEl.classList && activeEl.classList.contains('tb-content') && activeEl.isContentEditable;
  const mod = e.ctrlKey || e.metaKey;
  if(mod && e.key.toLowerCase()==='z' && !e.shiftKey){ e.preventDefault(); undo(); }
  else if((mod && e.key.toLowerCase()==='y') || (mod && e.shiftKey && e.key.toLowerCase()==='z')){ e.preventDefault(); redo(); }
  else if((e.key==='Delete' || e.key==='Backspace') && selectedTextBoxId && !isEditingText){ e.preventDefault(); deleteTextBox(selectedTextBoxId); }
  else if(mod && (e.key==='=' || e.key==='+')){ e.preventDefault(); zoomIn(); }
  else if(mod && e.key==='-'){ e.preventDefault(); zoomOut(); }
  else if(mod && e.key==='0'){ e.preventDefault(); fitToWidth(); }
});
undoBtn.addEventListener('click', undo);
redoBtn.addEventListener('click', redo);

/* ---------------- export ---------------- */
function hexToRgbObj(hex){
  const h = hex.replace('#','');
  const full = h.length===3 ? h.split('').map(c=>c+c).join('') : h;
  const bigint = parseInt(full, 16) || 0;
  const r = ((bigint>>16)&255)/255;
  const g = ((bigint>>8)&255)/255;
  const b = (bigint&255)/255;
  return PDFLib.rgb(r,g,b);
}
function sanitizeForStandardFont(str){
  return str.replace(/[^\x00-\xFF]/g, '?');
}
function downloadBlob(bytes, filename){
  const blob = new Blob([bytes], { type:'application/pdf' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = filename;
  document.body.appendChild(a); a.click(); document.body.removeChild(a);
  setTimeout(()=> URL.revokeObjectURL(url), 2000);
}
async function exportPdf(){
  if(!pdfBytes) return;
  try{
    downloadBtn.disabled = true;
    setSaveStatus('saving', 'Preparing download...');
    const { PDFDocument, StandardFonts, LineCapStyle } = PDFLib;
    const outDoc = await PDFDocument.load(pdfBytes.slice(0));
    const font = await outDoc.embedFont(StandardFonts.Helvetica);
    const pages = outDoc.getPages();
    const S = state.scale;

    for(let i=0;i<pages.length;i++){
      const pageNum = i+1;
      const pageData = state.pages[pageNum];
      if(!pageData) continue;
      const page = pages[i];
      const { height: ph } = page.getSize();

      for(const stroke of pageData.strokes){
        const pts = stroke.points;
        const color = hexToRgbObj(stroke.color);
        const thickness = Math.max(stroke.width / S, 0.5);
        const opacity = (stroke.opacity !== undefined) ? stroke.opacity : 1;
        const cap = stroke.cap === 'butt' ? LineCapStyle.Butt : LineCapStyle.Round;
        for(let j=0;j<pts.length-1;j++){
          page.drawLine({
            start:{ x: pts[j].x/S, y: ph - pts[j].y/S },
            end:{ x: pts[j+1].x/S, y: ph - pts[j+1].y/S },
            thickness,
            color,
            opacity,
            lineCap: cap
          });
        }
      }

      for(const tb of pageData.textBoxes){
        if(!tb.text || !tb.text.trim()) continue;
        const fontSizePt = Math.max(tb.fontSize / S, 4);
        const color = hexToRgbObj(tb.color);
        const topY = ph - (tb.y / S);
        const lines = sanitizeForStandardFont(tb.text).split('\n');
        lines.forEach((line, idx)=>{
          const baselineY = topY - fontSizePt*0.9 - idx*fontSizePt*1.25;
          if(baselineY < -fontSizePt) return;
          try{
            page.drawText(line, { x: tb.x/S, y: baselineY, size: fontSizePt, font, color });
          }catch(e){ /* skip unsupported line */ }
        });
      }
    }

    const outBytes = await outDoc.save();
    const base = (fileNameEl.textContent || 'document').replace(/\.pdf$/i,'');
    downloadBlob(outBytes, base + '-edited.pdf');
    setSaveStatus('saved', 'All changes saved');
    showToast('Your edited PDF has been downloaded.');
  }catch(err){
    console.error(err);
    setSaveStatus('error', 'Download failed');
    showToast('Something went wrong preparing the download. Please try again.');
  }finally{
    downloadBtn.disabled = false;
  }
}
downloadBtn.addEventListener('click', exportPdf);

/* ---------------- initial state ---------------- */
setSaveStatus('idle', 'No document');
</script>
</body>
</html>
